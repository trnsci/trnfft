name: Neuron Hardware Tests

on:
  workflow_dispatch:
    inputs:
      instance_type:
        description: "Instance type"
        required: true
        default: "trn1"
        type: choice
        options:
          - trn1
          - trn2
          - inf2

env:
  AWS_PROFILE: aws

jobs:
  neuron-test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1


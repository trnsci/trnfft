site_name: trnfft
site_description: FFT and complex-valued tensor operations for AWS Trainium via NKI
site_url: https://scttfrdmn.github.io/trnfft/
repo_url: https://github.com/trnsci/trnfft
repo_name: trnsci/trnfft

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - API Reference:
      - FFT Operations: api/fft.md
      - ComplexTensor: api/complex.md
      - Neural Network Layers: api/nn.md
      - NKI Backend: api/nki.md
  - Architecture: architecture.md
  - Benchmarks: benchmarks.md
  - Deployment:
      - AWS Setup for Neuron CI: aws_setup.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
